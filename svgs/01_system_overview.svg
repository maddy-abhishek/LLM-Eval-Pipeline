<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 575" width="900" height="575" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="575" fill="#F8FAFC"/>
  <rect width="900" height="52" fill="#0F172A"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="white">01 — System Overview</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">TechNest RAG Evaluation Pipeline · All Components and Connections</text>
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748B"/></marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#F59E0B"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10B981"/></marker>
    <marker id="arr-v" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8B5CF6"/></marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#EC4899"/></marker>
  </defs>

  <!-- LEFT COLUMN -->
  <rect x="20" y="78" width="120" height="48" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="80" y="98"  text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">👤 User</text>
  <text x="80" y="114" text-anchor="middle" font-size="10" fill="#64748B">Browser</text>

  <rect x="20" y="178" width="120" height="48" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="80" y="198" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">📄 catalog.json</text>
  <text x="80" y="214" text-anchor="middle" font-size="10" fill="#64748B">15 entries</text>

  <rect x="20" y="265" width="120" height="48" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="80" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">🎯 goldens.json</text>
  <text x="80" y="301" text-anchor="middle" font-size="10" fill="#64748B">5 Q&amp;A pairs</text>

  <!-- STREAMLIT APP outer box  x=165 y=65 w=390 h=475 -->
  <rect x="165" y="65" width="390" height="475" rx="12" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <rect x="165" y="65" width="390" height="36" rx="12" fill="#1D4ED8"/>
  <rect x="165" y="89"  width="390" height="12" fill="#1D4ED8"/>
  <text x="360" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="white">Streamlit App — app.py</text>

  <!-- Tabs -->
  <rect x="182" y="116" width="356" height="28" rx="5" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="360" y="134" text-anchor="middle" font-size="10" fill="#1D4ED8">📚 Catalog  |  🎯 Goldens  |  🚀 Run Evaluation  |  📊 Results</text>

  <!-- Phase 1  y=156 h=88 -->
  <rect x="182" y="156" width="356" height="88" rx="8" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <rect x="182" y="156" width="356" height="28" rx="8" fill="#047857"/>
  <rect x="182" y="172" width="356" height="12" fill="#047857"/>
  <text x="360" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="white">Phase 1 — RAG Pipeline</text>
  <text x="360" y="202" text-anchor="middle" font-size="10" fill="#047857">Retrieve context (Gemini) · Generate answer (Groq 70b)</text>
  <text x="360" y="218" text-anchor="middle" font-size="9"  fill="#64748B">evals/runner.py · rag/retriever.py · rag/generator.py</text>
  <text x="360" y="233" text-anchor="middle" font-size="9"  fill="#64748B">5 goldens · 5 s spacing between each</text>

  <!-- Phase 2  y=256 h=88 -->
  <rect x="182" y="256" width="356" height="88" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="182" y="256" width="356" height="28" rx="8" fill="#4C1D95"/>
  <rect x="182" y="272" width="356" height="12" fill="#4C1D95"/>
  <text x="360" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="white">Phase 2 — RAGAS Evaluation</text>
  <text x="360" y="302" text-anchor="middle" font-size="10" fill="#6D28D9">Score 5 metrics · 25 s between samples · 35 s between exps</text>
  <text x="360" y="318" text-anchor="middle" font-size="9"  fill="#64748B">evals/metrics.py · evals/reporter.py</text>
  <text x="360" y="333" text-anchor="middle" font-size="9"  fill="#64748B">Checkpoint saved to disk after every experiment</text>

  <!-- _run thread  y=356 h=66 -->
  <rect x="182" y="356" width="172" height="66" rx="6" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text x="268" y="376" text-anchor="middle" font-size="11" font-weight="700" fill="#0F766E">⚙ _run() Thread</text>
  <text x="268" y="392" text-anchor="middle" font-size="10" fill="#0D9488">ThreadPoolExecutor</text>
  <text x="268" y="408" text-anchor="middle" font-size="9"  fill="#64748B">Isolates async from Streamlit</text>

  <!-- Checkpoint  y=356 h=66 -->
  <rect x="366" y="356" width="172" height="66" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="452" y="376" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">💾 Checkpoint</text>
  <text x="452" y="392" text-anchor="middle" font-size="10" fill="#B91C1C">Save after every exp.</text>
  <text x="452" y="408" text-anchor="middle" font-size="9"  fill="#64748B">Restore on reconnect</text>

  <!-- BYOK  y=434 h=48 -->
  <rect x="182" y="434" width="356" height="48" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="360" y="454" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">🔑 BYOK Sidebar</text>
  <text x="360" y="470" text-anchor="middle" font-size="9"  fill="#64748B">GROQ_API_KEY · JUDGE_GROQ · GEMINI_API_KEY</text>

  <!-- RIGHT COLUMN APIs -->
  <rect x="605" y="148" width="200" height="68" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="705" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#78350F">Groq API</text>
  <text x="705" y="186" text-anchor="middle" font-size="10" fill="#92400E">llama-3.3-70b-versatile</text>
  <text x="705" y="200" text-anchor="middle" font-size="9"  fill="#64748B">RAG Answer Generation</text>

  <rect x="605" y="248" width="200" height="68" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="705" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Gemini API</text>
  <text x="705" y="286" text-anchor="middle" font-size="10" fill="#047857">gemini-embedding-2-preview</text>
  <text x="705" y="300" text-anchor="middle" font-size="9"  fill="#64748B">Retrieval Embeddings</text>

  <rect x="605" y="348" width="200" height="68" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="705" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#4C1D95">Groq API (Judge)</text>
  <text x="705" y="386" text-anchor="middle" font-size="10" fill="#6D28D9">llama-3.1-8b-instant</text>
  <text x="705" y="400" text-anchor="middle" font-size="9"  fill="#64748B">RAGAS Metric Scoring</text>

  <rect x="605" y="448" width="200" height="68" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="2"/>
  <text x="705" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">HuggingFace (local)</text>
  <text x="705" y="486" text-anchor="middle" font-size="10" fill="#9D174D">all-MiniLM-L6-v2</text>
  <text x="705" y="500" text-anchor="middle" font-size="9"  fill="#64748B">RAGAS Semantic Embeddings</text>

  <!-- ARROWS left col → app -->
  <line x1="140" y1="102" x2="163" y2="118" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="140" y1="202" x2="163" y2="202" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="140" y1="289" x2="163" y2="260" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase1 → Groq 70b -->
  <line x1="538" y1="196" x2="603" y2="182" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="569" y="184" text-anchor="middle" font-size="9" fill="#92400E">generate</text>

  <!-- Phase1 → Gemini -->
  <line x1="538" y1="210" x2="603" y2="282" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="573" y="240" text-anchor="middle" font-size="9" fill="#047857">embed</text>

  <!-- Phase2 → Groq 8b -->
  <line x1="538" y1="296" x2="603" y2="382" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <text x="573" y="330" text-anchor="middle" font-size="9" fill="#6D28D9">judge</text>

  <!-- Phase2 → HuggingFace -->
  <line x1="538" y1="310" x2="603" y2="482" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="576" y="408" text-anchor="middle" font-size="9" fill="#9D174D">embed</text>

  <rect y="547" width="900" height="28" fill="#1E293B"/>
  <text x="450" y="566" text-anchor="middle" font-size="10" fill="#94A3B8">💡 RAGAS uses HuggingFace embeddings, not Gemini — GoogleGenerativeAIEmbeddings does not implement BaseRagasEmbedding</text>
</svg>
