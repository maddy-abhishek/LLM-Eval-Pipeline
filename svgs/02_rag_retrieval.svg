<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="500" fill="#F8FAFC"/>
  <rect width="900" height="52" fill="#0F172A"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="white">02 — RAG Retrieval</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">How Gemini embeddings power vector search · rag/retriever.py</text>
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748B"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10B981"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3B82F6"/></marker>
  </defs>

  <!-- LEFT PANEL: Index Time -->
  <rect x="20" y="66" width="410" height="400" rx="10" fill="white" stroke="#10B981" stroke-width="2"/>
  <rect x="20" y="66" width="410" height="36" rx="10" fill="#065F46"/>
  <rect x="20" y="90"  width="410" height="12" fill="#065F46"/>
  <text x="225" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="white">INDEX TIME — runs once at startup</text>
  <text x="225" y="104" text-anchor="middle" font-size="9" fill="#6EE7B7">Retriever.__init__() calls _embed_catalog()</text>

  <!-- Step 1 -->
  <rect x="45" y="118" width="360" height="52" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="225" y="139" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">📄 catalog.json</text>
  <text x="225" y="156" text-anchor="middle" font-size="10" fill="#64748B">15 entries → "title. content" text strings</text>
  <line x1="225" y1="170" x2="225" y2="184" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="45" y="186" width="360" height="62" rx="6" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="225" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Gemini Embedding API</text>
  <text x="225" y="224" text-anchor="middle" font-size="10" fill="#047857">embedder.embed_documents(texts)</text>
  <text x="225" y="239" text-anchor="middle" font-size="9"  fill="#64748B">gemini-embedding-2-preview · 768-dim output</text>
  <line x1="225" y1="248" x2="225" y2="262" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Step 3 -->
  <rect x="45" y="264" width="360" height="62" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="225" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">15 × 768-dim Vectors</text>
  <text x="225" y="302" text-anchor="middle" font-size="10" fill="#3B82F6">numpy array, shape (15, 768)</text>
  <text x="225" y="317" text-anchor="middle" font-size="9"  fill="#64748B">L2-normalised (each row divided by its norm)</text>
  <line x1="225" y1="326" x2="225" y2="340" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Step 4 -->
  <rect x="45" y="342" width="360" height="52" rx="6" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text x="225" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">self._embeddings (cached in memory)</text>
  <text x="225" y="379" text-anchor="middle" font-size="10" fill="#0D9488">Stored in Retriever object · never re-embedded</text>

  <!-- RIGHT PANEL: Query Time -->
  <rect x="470" y="66" width="410" height="400" rx="10" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="470" y="66" width="410" height="36" rx="10" fill="#4C1D95"/>
  <rect x="470" y="90"  width="410" height="12" fill="#4C1D95"/>
  <text x="675" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="white">QUERY TIME — runs per golden question</text>
  <text x="675" y="104" text-anchor="middle" font-size="9" fill="#C4B5FD">retriever.retrieve(query, top_k=3)</text>

  <!-- Step 1 -->
  <rect x="495" y="118" width="360" height="52" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="675" y="139" text-anchor="middle" font-size="12" font-weight="700" fill="#4C1D95">User Question</text>
  <text x="675" y="156" text-anchor="middle" font-size="10" fill="#64748B">"What is TechNest's return policy?"</text>
  <line x1="675" y1="170" x2="675" y2="184" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="495" y="186" width="360" height="62" rx="6" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="675" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Gemini Embedding API</text>
  <text x="675" y="224" text-anchor="middle" font-size="10" fill="#047857">embedder.embed_query(query)</text>
  <text x="675" y="239" text-anchor="middle" font-size="9"  fill="#64748B">Same model → same 768-dim vector space</text>
  <line x1="675" y1="248" x2="675" y2="262" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Step 3 -->
  <rect x="495" y="264" width="360" height="52" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="675" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">768-dim Query Vector (L2-normalised)</text>
  <text x="675" y="302" text-anchor="middle" font-size="10" fill="#3B82F6">qvec shape: (768,)</text>
  <line x1="675" y1="316" x2="675" y2="330" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="495" y="332" width="360" height="44" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="675" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#7C2D12">Cosine Similarity</text>
  <text x="675" y="368" text-anchor="middle" font-size="10" fill="#9A3412">self._embeddings @ qvec  →  15 scores</text>
  <line x1="675" y1="376" x2="675" y2="390" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="495" y="392" width="360" height="44" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="675" y="411" text-anchor="middle" font-size="12" font-weight="700" fill="#78350F">Top-3 Content Chunks</text>
  <text x="675" y="427" text-anchor="middle" font-size="10" fill="#92400E">np.argsort(scores)[::-1][:top_k]  →  list[str]</text>

  <rect y="472" width="900" height="28" fill="#1E293B"/>
  <text x="450" y="491" text-anchor="middle" font-size="10" fill="#94A3B8">💡 Both catalog and query use the same Gemini model → same vector space → dot product equals cosine similarity</text>
</svg>
