<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect width="800" height="52" fill="#0F172A"/>
  <text x="400" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="white">03 — RAG Generation</text>
  <text x="400" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">How the LLM turns retrieved context into an answer · rag/generator.py</text>
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748B"/></marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#F59E0B"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10B981"/></marker>
  </defs>

  <!-- INPUT ROW -->
  <!-- User question -->
  <rect x="30" y="72" width="210" height="60" rx="8" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="135" y="94"  text-anchor="middle" font-size="12" font-weight="700" fill="#4C1D95">User Question</text>
  <text x="135" y="110" text-anchor="middle" font-size="9"  fill="#64748B">"What is TechNest's</text>
  <text x="135" y="124" text-anchor="middle" font-size="9"  fill="#64748B">return policy?"</text>

  <!-- Retrieved contexts -->
  <rect x="280" y="72" width="490" height="60" rx="8" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="525" y="94"  text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Retrieved Context Chunks (top-3 from Gemini search)</text>
  <text x="525" y="110" text-anchor="middle" font-size="9"  fill="#047857">[1] "TechNest accepts returns within 30 days…"</text>
  <text x="525" y="124" text-anchor="middle" font-size="9"  fill="#047857">[2] "Free shipping on orders over $50…"    [3] …</text>

  <!-- Arrows down into Prompt Builder -->
  <line x1="135" y1="132" x2="135" y2="160" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="525" y1="132" x2="400" y2="160" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PROMPT BUILDER -->
  <rect x="30" y="162" width="740" height="120" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="30" y="162" width="740" height="26" rx="8" fill="#78350F"/>
  <rect x="30" y="176"  width="740" height="12" fill="#78350F"/>
  <text x="400" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="white">Prompt Builder</text>

  <!-- System prompt inner box -->
  <rect x="50" y="198" width="320" height="70" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1"/>
  <text x="210" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#713F12">System Prompt</text>
  <text x="210" y="234" text-anchor="middle" font-size="9"  fill="#78350F">"You are TechNest customer support.</text>
  <text x="210" y="248" text-anchor="middle" font-size="9"  fill="#78350F">Answer ONLY from the context below."</text>
  <text x="210" y="261" text-anchor="middle" font-size="9"  fill="#64748B">role: system</text>

  <!-- User message inner box -->
  <rect x="400" y="198" width="350" height="70" rx="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1"/>
  <text x="575" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#713F12">User Message</text>
  <text x="575" y="234" text-anchor="middle" font-size="9"  fill="#78350F">Context: [1] … [2] … [3] …</text>
  <text x="575" y="248" text-anchor="middle" font-size="9"  fill="#78350F">Customer question: {query}</text>
  <text x="575" y="261" text-anchor="middle" font-size="9"  fill="#64748B">role: user</text>

  <!-- Arrow down to Groq -->
  <line x1="400" y1="282" x2="400" y2="300" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <!-- GROQ API -->
  <rect x="160" y="302" width="480" height="78" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#78350F">Groq API — llama-3.3-70b-versatile</text>
  <text x="400" y="344" text-anchor="middle" font-size="11" fill="#92400E">temperature=0 · max_tokens=300</text>
  <text x="400" y="361" text-anchor="middle" font-size="9"  fill="#64748B">AsyncOpenAI client → https://api.groq.com/openai/v1</text>

  <!-- Arrow down to output -->
  <line x1="400" y1="380" x2="400" y2="398" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- OUTPUT -->
  <rect x="160" y="400" width="480" height="42" rx="8" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="400" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Generated Response</text>
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#047857">response.choices[0].message.content.strip()</text>

  <rect y="432" width="800" height="28" fill="#1E293B"/>
  <text x="400" y="451" text-anchor="middle" font-size="10" fill="#94A3B8">💡 temperature=0 ensures deterministic answers · context block prevents hallucination by grounding the LLM to facts</text>
</svg>
