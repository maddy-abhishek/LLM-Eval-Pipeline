<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 600" width="1020" height="600" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="1020" height="600" fill="#F8FAFC"/>
  <rect width="1020" height="52" fill="#0F172A"/>
  <text x="510" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="white">09 — The 5 RAGAS Metrics</text>
  <text x="510" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">What each metric measures · inputs it needs · LLM or embeddings</text>

  <!-- ROW 1: Faithfulness, Answer Relevancy, Context Precision -->
  <!-- Each card: x, y=68, w=300, h=230 -->

  <!-- FAITHFULNESS  x=18 -->
  <rect x="18"  y="68" width="300" height="230" rx="10" fill="white" stroke="#10B981" stroke-width="2"/>
  <rect x="18"  y="68" width="300" height="32"  rx="10" fill="#065F46"/>
  <rect x="18"  y="88" width="300" height="12"  fill="#065F46"/>
  <text x="168" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="white">Faithfulness</text>

  <text x="168" y="117" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">What it asks:</text>
  <text x="168" y="132" text-anchor="middle" font-size="10" fill="#047857">"Are all claims in the answer</text>
  <text x="168" y="147" text-anchor="middle" font-size="10" fill="#047857">supported by retrieved context?"</text>

  <line x1="28" y1="158" x2="308" y2="158" stroke="#E2E8F0" stroke-width="1"/>
  <text x="168" y="173" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Inputs needed:</text>
  <text x="168" y="188" text-anchor="middle" font-size="9"  fill="#64748B">user_input  ·  response  ·  retrieved_contexts</text>

  <line x1="28" y1="198" x2="308" y2="198" stroke="#E2E8F0" stroke-width="1"/>
  <text x="168" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Uses:</text>
  <text x="168" y="228" text-anchor="middle" font-size="10" fill="#065F46">🤖 LLM only  (Groq llama-3.1-8b)</text>
  <text x="168" y="244" text-anchor="middle" font-size="9"  fill="#64748B">Extracts claims, checks each vs context</text>
  <text x="168" y="288" text-anchor="middle" font-size="9"  fill="#94A3B8">🟢 ≥0.75 good  🟡 0.50–0.74  🔴 &lt;0.50 poor</text>

  <!-- ANSWER RELEVANCY  x=360 -->
  <rect x="360" y="68" width="300" height="230" rx="10" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <rect x="360" y="68" width="300" height="32"  rx="10" fill="#4C1D95"/>
  <rect x="360" y="88" width="300" height="12"  fill="#4C1D95"/>
  <text x="510" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="white">Answer Relevancy</text>

  <text x="510" y="117" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">What it asks:</text>
  <text x="510" y="132" text-anchor="middle" font-size="10" fill="#6D28D9">"Is the response actually addressing</text>
  <text x="510" y="147" text-anchor="middle" font-size="10" fill="#6D28D9">what the user asked?"</text>

  <line x1="370" y1="158" x2="650" y2="158" stroke="#E2E8F0" stroke-width="1"/>
  <text x="510" y="173" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Inputs needed:</text>
  <text x="510" y="188" text-anchor="middle" font-size="9"  fill="#64748B">user_input  ·  response</text>

  <line x1="370" y1="198" x2="650" y2="198" stroke="#E2E8F0" stroke-width="1"/>
  <text x="510" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Uses:</text>
  <text x="510" y="228" text-anchor="middle" font-size="10" fill="#6D28D9">🤖 LLM  +  📐 Embeddings  (cosine)</text>
  <text x="510" y="244" text-anchor="middle" font-size="9"  fill="#64748B">Generates reverse questions, checks similarity</text>
  <text x="510" y="288" text-anchor="middle" font-size="9"  fill="#94A3B8">🟢 ≥0.75 good  🟡 0.50–0.74  🔴 &lt;0.50 poor</text>

  <!-- CONTEXT PRECISION  x=702 -->
  <rect x="702" y="68" width="300" height="230" rx="10" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <rect x="702" y="68" width="300" height="32"  rx="10" fill="#1D4ED8"/>
  <rect x="702" y="88" width="300" height="12"  fill="#1D4ED8"/>
  <text x="852" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="white">Context Precision</text>

  <text x="852" y="117" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">What it asks:</text>
  <text x="852" y="132" text-anchor="middle" font-size="10" fill="#1D4ED8">"Are the chunks we retrieved</text>
  <text x="852" y="147" text-anchor="middle" font-size="10" fill="#1D4ED8">actually relevant to the question?"</text>

  <line x1="712" y1="158" x2="992" y2="158" stroke="#E2E8F0" stroke-width="1"/>
  <text x="852" y="173" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Inputs needed:</text>
  <text x="852" y="188" text-anchor="middle" font-size="9"  fill="#64748B">user_input  ·  retrieved_contexts  ·  reference</text>

  <line x1="712" y1="198" x2="992" y2="198" stroke="#E2E8F0" stroke-width="1"/>
  <text x="852" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Uses:</text>
  <text x="852" y="228" text-anchor="middle" font-size="10" fill="#1D4ED8">🤖 LLM only</text>
  <text x="852" y="244" text-anchor="middle" font-size="9"  fill="#64748B">High = no noisy chunks · low = retriever off-topic</text>
  <text x="852" y="288" text-anchor="middle" font-size="9"  fill="#94A3B8">🟢 ≥0.75 good  🟡 0.50–0.74  🔴 &lt;0.50 poor</text>

  <!-- ROW 2 -->

  <!-- CONTEXT RECALL  x=18 -->
  <rect x="18"  y="320" width="300" height="230" rx="10" fill="white" stroke="#EC4899" stroke-width="2"/>
  <rect x="18"  y="320" width="300" height="32"  rx="10" fill="#831843"/>
  <rect x="18"  y="340" width="300" height="12"  fill="#831843"/>
  <text x="168" y="341" text-anchor="middle" font-size="13" font-weight="700" fill="white">Context Recall</text>

  <text x="168" y="369" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">What it asks:</text>
  <text x="168" y="384" text-anchor="middle" font-size="10" fill="#9D174D">"Did we retrieve ALL the information</text>
  <text x="168" y="399" text-anchor="middle" font-size="10" fill="#9D174D">needed to answer this question?"</text>

  <line x1="28" y1="410" x2="308" y2="410" stroke="#E2E8F0" stroke-width="1"/>
  <text x="168" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Inputs needed:</text>
  <text x="168" y="440" text-anchor="middle" font-size="9"  fill="#64748B">user_input  ·  retrieved_contexts  ·  reference</text>

  <line x1="28" y1="450" x2="308" y2="450" stroke="#E2E8F0" stroke-width="1"/>
  <text x="168" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Uses:</text>
  <text x="168" y="480" text-anchor="middle" font-size="10" fill="#EC4899">🤖 LLM only</text>
  <text x="168" y="496" text-anchor="middle" font-size="9"  fill="#64748B">High = context has all reference facts</text>
  <text x="168" y="540" text-anchor="middle" font-size="9"  fill="#94A3B8">🟢 ≥0.75 good  🟡 0.50–0.74  🔴 &lt;0.50 poor</text>

  <!-- ANSWER CORRECTNESS  x=360 -->
  <rect x="360" y="320" width="300" height="230" rx="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <rect x="360" y="320" width="300" height="32"  rx="10" fill="#78350F"/>
  <rect x="360" y="340" width="300" height="12"  fill="#78350F"/>
  <text x="510" y="341" text-anchor="middle" font-size="13" font-weight="700" fill="white">Answer Correctness</text>

  <text x="510" y="369" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">What it asks:</text>
  <text x="510" y="384" text-anchor="middle" font-size="10" fill="#92400E">"Is the LLM answer factually correct</text>
  <text x="510" y="399" text-anchor="middle" font-size="10" fill="#92400E">vs the ground truth reference?"</text>

  <line x1="370" y1="410" x2="650" y2="410" stroke="#E2E8F0" stroke-width="1"/>
  <text x="510" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Inputs needed:</text>
  <text x="510" y="440" text-anchor="middle" font-size="9"  fill="#64748B">user_input  ·  response  ·  reference</text>

  <line x1="370" y1="450" x2="650" y2="450" stroke="#E2E8F0" stroke-width="1"/>
  <text x="510" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Uses:</text>
  <text x="510" y="480" text-anchor="middle" font-size="10" fill="#78350F">🤖 LLM  +  📐 Embeddings  (weighted)</text>
  <text x="510" y="496" text-anchor="middle" font-size="9"  fill="#64748B">Factual F1 + semantic similarity combined</text>
  <text x="510" y="540" text-anchor="middle" font-size="9"  fill="#94A3B8">🟢 ≥0.75 good  🟡 0.50–0.74  🔴 &lt;0.50 poor</text>

  <!-- LEGEND  x=702 -->
  <rect x="702" y="320" width="300" height="230" rx="10" fill="white" stroke="#64748B" stroke-width="1.5"/>
  <rect x="702" y="320" width="300" height="32"  rx="10" fill="#334155"/>
  <rect x="702" y="340" width="300" height="12"  fill="#334155"/>
  <text x="852" y="341" text-anchor="middle" font-size="13" font-weight="700" fill="white">Legend &amp; Rules</text>

  <text x="712" y="370" font-size="11" font-weight="700" fill="#334155">Symbols:</text>
  <text x="712" y="387" font-size="10" fill="#334155">🤖  LLM calls (Groq llama-3.1-8b-instant)</text>
  <text x="712" y="403" font-size="10" fill="#334155">📐  Embeddings (HuggingFace MiniLM-L6)</text>

  <line x1="712" y1="415" x2="992" y2="415" stroke="#E2E8F0" stroke-width="1"/>
  <text x="712" y="432" font-size="11" font-weight="700" fill="#334155">Score thresholds:</text>
  <text x="712" y="449" font-size="10" fill="#065F46">🟢 ≥ 0.75  —  Good  (safe to ship)</text>
  <text x="712" y="466" font-size="10" fill="#78350F">🟡 0.50 – 0.74  —  Fair  (investigate)</text>
  <text x="712" y="483" font-size="10" fill="#991B1B">🔴 &lt; 0.50  —  Poor  (fix before shipping)</text>
  <text x="712" y="500" font-size="10" fill="#94A3B8">⬜ N/A  —  Sample failed to score</text>

  <line x1="712" y1="510" x2="992" y2="510" stroke="#E2E8F0" stroke-width="1"/>
  <text x="712" y="526" font-size="9" fill="#64748B">Answer Relevancy and Answer Correctness</text>
  <text x="712" y="540" font-size="9" fill="#64748B">need HuggingFace embeddings (RAGAS only)</text>

  <rect y="572" width="1020" height="28" fill="#1E293B"/>
  <text x="510" y="591" text-anchor="middle" font-size="10" fill="#94A3B8">💡 Metrics that need reference (ground truth): Context Precision · Context Recall · Answer Correctness — always include reference in goldens.json</text>
</svg>
