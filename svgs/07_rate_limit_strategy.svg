<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="980" height="520" fill="#F8FAFC"/>
  <rect width="980" height="52" fill="#0F172A"/>
  <text x="490" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="white">07 — Rate Limit Strategy</text>
  <text x="490" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">Staying under 6,000 TPM on Groq free tier · evals/metrics.py</text>

  <!-- TOKEN BUDGET -->
  <rect x="20" y="66" width="285" height="262" rx="10" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="20" y="66"  width="285" height="34" rx="10" fill="#4C1D95"/>
  <rect x="20" y="88"  width="285" height="12" fill="#4C1D95"/>
  <text x="162" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">Token Budget per Sample</text>

  <rect x="30" y="108" width="265" height="24" rx="4" fill="#F1F5F9"/>
  <text x="130" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Metric</text>
  <text x="262" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">~Tokens</text>

  <rect x="30" y="134" width="265" height="22" rx="3" fill="#ECFDF5"/>
  <text x="130" y="149" text-anchor="middle" font-size="10" fill="#065F46">Faithfulness</text>
  <text x="262" y="149" text-anchor="middle" font-size="10" fill="#065F46">1,100</text>

  <rect x="30" y="158" width="265" height="22" rx="3" fill="#FFF7ED"/>
  <text x="130" y="173" text-anchor="middle" font-size="10" fill="#7C2D12">Answer Relevancy</text>
  <text x="262" y="173" text-anchor="middle" font-size="10" fill="#7C2D12">250</text>

  <rect x="30" y="182" width="265" height="22" rx="3" fill="#EFF6FF"/>
  <text x="130" y="197" text-anchor="middle" font-size="10" fill="#1D4ED8">Context Precision</text>
  <text x="262" y="197" text-anchor="middle" font-size="10" fill="#1D4ED8">700</text>

  <rect x="30" y="206" width="265" height="22" rx="3" fill="#FDF2F8"/>
  <text x="130" y="221" text-anchor="middle" font-size="10" fill="#831843">Context Recall</text>
  <text x="262" y="221" text-anchor="middle" font-size="10" fill="#831843">700</text>

  <rect x="30" y="230" width="265" height="22" rx="3" fill="#FFFBEB"/>
  <text x="130" y="245" text-anchor="middle" font-size="10" fill="#78350F">Answer Correctness</text>
  <text x="262" y="245" text-anchor="middle" font-size="10" fill="#78350F">1,050</text>

  <line x1="30" y1="256" x2="295" y2="256" stroke="#CBD5E1" stroke-width="1"/>
  <text x="130" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">5 samples × max</text>
  <text x="262" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">5,500</text>
  <text x="162" y="292" text-anchor="middle" font-size="9"  fill="#64748B">safely under 6,000 TPM limit</text>
  <text x="162" y="308" text-anchor="middle" font-size="9"  fill="#64748B">with 25 s spacing between samples</text>

  <!-- TIMELINE -->
  <rect x="325" y="66" width="635" height="262" rx="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <rect x="325" y="66"  width="635" height="34" rx="10" fill="#78350F"/>
  <rect x="325" y="88"  width="635" height="12" fill="#78350F"/>
  <text x="642" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">Cooldown Timeline (one experiment — 5 samples)</text>

  <text x="642" y="118" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">4 × 25 s  +  5 × ~2 s  ≈  110 seconds per experiment</text>

  <!-- Timeline baseline -->
  <line x1="345" y1="170" x2="940" y2="170" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Sample blocks -->
  <rect x="345" y="150" width="60" height="40" rx="5" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="375" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">S1</text>
  <text x="375" y="182" text-anchor="middle" font-size="9"  fill="#047857">~2 s</text>

  <rect x="405" y="160" width="80" height="20" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="445" y="174" text-anchor="middle" font-size="9"  font-weight="700" fill="#991B1B">sleep 25 s</text>

  <rect x="485" y="150" width="60" height="40" rx="5" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="515" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">S2</text>
  <text x="515" y="182" text-anchor="middle" font-size="9"  fill="#047857">~2 s</text>

  <rect x="545" y="160" width="80" height="20" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="585" y="174" text-anchor="middle" font-size="9"  font-weight="700" fill="#991B1B">sleep 25 s</text>

  <rect x="625" y="150" width="60" height="40" rx="5" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="655" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">S3</text>
  <text x="655" y="182" text-anchor="middle" font-size="9"  fill="#047857">~2 s</text>

  <rect x="685" y="160" width="80" height="20" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="725" y="174" text-anchor="middle" font-size="9"  font-weight="700" fill="#991B1B">sleep 25 s</text>

  <rect x="765" y="150" width="60" height="40" rx="5" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="795" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">S4</text>
  <text x="795" y="182" text-anchor="middle" font-size="9"  fill="#047857">~2 s</text>

  <rect x="825" y="160" width="80" height="20" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="865" y="174" text-anchor="middle" font-size="9"  font-weight="700" fill="#991B1B">sleep 25 s</text>

  <rect x="905" y="150" width="52" height="40" rx="5" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="931" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">S5</text>
  <text x="931" y="182" text-anchor="middle" font-size="9"  fill="#047857">~2 s</text>

  <!-- Between experiments -->
  <rect x="345" y="208" width="615" height="30" rx="5" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="652" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#7C2D12">time.sleep(35)  —  EXPERIMENT_COOLDOWN  between experiments  (in main thread)</text>

  <text x="642" y="260" text-anchor="middle" font-size="10" fill="#64748B">5 experiments × 110 s  +  4 × 35 s cooldown  ≈  690 s total  (~12 min)</text>

  <!-- 429 RETRY -->
  <rect x="20" y="350" width="285" height="140" rx="10" fill="white" stroke="#DC2626" stroke-width="2"/>
  <rect x="20" y="350"  width="285" height="34" rx="10" fill="#991B1B"/>
  <rect x="20" y="372"  width="285" height="12" fill="#991B1B"/>
  <text x="162" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="white">429 Rate Limit Handling</text>
  <text x="162" y="398" text-anchor="middle" font-size="10" fill="#334155">1. Detect "429", "rate", "quota" in error</text>
  <text x="162" y="415" text-anchor="middle" font-size="10" fill="#334155">2. Log to error_collector (plain list)</text>
  <text x="162" y="432" text-anchor="middle" font-size="10" font-weight="700" fill="#991B1B">3. await asyncio.sleep(65)  — RETRY_WAIT</text>
  <text x="162" y="449" text-anchor="middle" font-size="10" fill="#334155">4. Retry once → float or None</text>
  <text x="162" y="466" text-anchor="middle" font-size="9"  fill="#64748B">None displayed as ⬜ N/A in Results tab</text>

  <!-- CONSTANTS -->
  <rect x="325" y="350" width="635" height="140" rx="10" fill="white" stroke="#10B981" stroke-width="2"/>
  <rect x="325" y="350"  width="635" height="34" rx="10" fill="#065F46"/>
  <rect x="325" y="372"  width="635" height="12" fill="#065F46"/>
  <text x="642" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="white">Timing Constants (evals/metrics.py)</text>

  <rect x="345" y="388" width="185" height="80" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="437" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#4C1D95">SAMPLE_COOLDOWN</text>
  <text x="437" y="427" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">25 s</text>
  <text x="437" y="447" text-anchor="middle" font-size="9"  fill="#64748B">between samples</text>
  <text x="437" y="461" text-anchor="middle" font-size="9"  fill="#64748B">within one experiment</text>

  <rect x="555" y="388" width="185" height="80" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="647" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#7C2D12">EXPERIMENT_COOLDOWN</text>
  <text x="647" y="427" text-anchor="middle" font-size="16" font-weight="700" fill="#92400E">35 s</text>
  <text x="647" y="447" text-anchor="middle" font-size="9"  fill="#64748B">between experiments</text>
  <text x="647" y="461" text-anchor="middle" font-size="9"  fill="#64748B">resets the TPM window</text>

  <rect x="765" y="388" width="175" height="80" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="852" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">RETRY_WAIT</text>
  <text x="852" y="427" text-anchor="middle" font-size="16" font-weight="700" fill="#DC2626">65 s</text>
  <text x="852" y="447" text-anchor="middle" font-size="9"  fill="#64748B">after a 429 error</text>
  <text x="852" y="461" text-anchor="middle" font-size="9"  fill="#64748B">before one retry</text>

  <rect y="492" width="980" height="28" fill="#1E293B"/>
  <text x="490" y="511" text-anchor="middle" font-size="10" fill="#94A3B8">💡 CONTEXT_CHARS=400 and CONTEXT_LIMIT=2 trim each input to keep tokens per API call predictable and small</text>
</svg>
